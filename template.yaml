# The AWSTemplateFormatVersion identifies the capabilities of the template
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/format-version-structure.html
AWSTemplateFormatVersion: 2010-09-09
Description: >-
  clean-up-sikkim
Transform:
  - AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        DYNAMODB_ENDPOINT: http://host.docker.internal:8000

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: "The deployment environment."

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !Sub "${Environment}-cleanup-sikkim-users"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false
        - Name: city
          AttributeDataType: String
          Mutable: true
          Required: false
        - Name: state
          AttributeDataType: String
          Mutable: true
          Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${Environment}-cleanup-sikkim-app"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      ReadAttributes:
        - email
        - name
        - custom:city
        - custom:state
      WriteAttributes:
        - email
        - name
        - custom:city
        - custom:state

  CleanUpSikkimApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
  # S3
  DumpPinsPhotoBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${Environment}-cleanup-sikkim-photos"
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*" # tighten this to your domain in prod
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedHeaders:
              - "*"
            MaxAge: 3000
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1

  GenerateUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: generate-upload-url.generateUploadUrlHandler
      CodeUri: src/handlers/storage
      Runtime: nodejs22.x
      Environment:
        Variables:
          DUMP_PINS_BUCKET: !Ref DumpPinsPhotoBucket
      Policies:
        - S3WritePolicy:
            BucketName: !Ref DumpPinsPhotoBucket
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /upload/presigned-url
            Method: POST

  # DynamoDB tables
  Users:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Users
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: city
          AttributeType: S
        - AttributeName: state
          AttributeType: S
        - AttributeName: totalPoints
          AttributeType: N
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: GSI-City-Points
          KeySchema:
            - AttributeName: city
              KeyType: HASH
            - AttributeName: totalPoints
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
        - IndexName: GSI-State-Points
          KeySchema:
            - AttributeName: state
              KeyType: HASH
            - AttributeName: totalPoints
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  DumpPins:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: DumpPins
      AttributeDefinitions:
        - AttributeName: pinId
          AttributeType: S
        - AttributeName: geohash
          AttributeType: S
        - AttributeName: city
          AttributeType: S
        - AttributeName: state
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: reportedBy
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: pinId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: GSI-Geohash
          KeySchema:
            - AttributeName: geohash
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-City-Status
          KeySchema:
            - AttributeName: city
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-State-Status
          KeySchema:
            - AttributeName: state
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-ReportedBy
          KeySchema:
            - AttributeName: reportedBy
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  Events:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Events
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: geohash
          AttributeType: S
        - AttributeName: scheduledAt
          AttributeType: S
        - AttributeName: geohash4
          AttributeType: S
        - AttributeName: geohash5
          AttributeType: S
        - AttributeName: pinId
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: GSI-Geohash-Time
          KeySchema:
            - AttributeName: geohash
              KeyType: HASH
            - AttributeName: scheduledAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-Geohash4-Time
          KeySchema:
            - AttributeName: geohash4
              KeyType: HASH
            - AttributeName: scheduledAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-Geohash5-Time
          KeySchema:
            - AttributeName: geohash5
              KeyType: HASH
            - AttributeName: scheduledAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-Pin-Events
          KeySchema:
            - AttributeName: pinId
              KeyType: HASH
            - AttributeName: scheduledAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  EventParticipants:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: EventParticipants
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: registeredAt
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI-User-Events
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: registeredAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  PointTransactions:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PointTransactions
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: txnId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: txnId
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  # Lambda function definitions
  GetTrashDumps:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-trash-dumps.getTrashDumpsHandler
      CodeUri: src/handlers/trash-dump-pins
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 100
      Description: Get all trash dump pins for a given lat and lng.
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /trash-dumps
            Method: GET
            Auth:
              Authorizer: NONE
      Environment:
        Variables:
          DUMP_PINS_TABLE: !Ref DumpPins
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DumpPins
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - get-trash-dumps.ts

  CreateTrashDumpPin:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create-trash-dump-pin.createTrashDumpPinHandler
      CodeUri: src/handlers/trash-dump-pins
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 100
      Description: Create a new trash dump pin with given details.
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /trash-dumps
            Method: POST
      Environment:
        Variables:
          DUMP_PINS_TABLE: !Ref DumpPins
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DumpPins
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - create-trash-dump-pin.ts

  DeleteTrashDumpPin:
    Type: AWS::Serverless::Function
    Properties:
      Handler: delete-trash-dump-pin.deleteTrashDumpPinHandler
      CodeUri: src/handlers/trash-dump-pins
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 100
      Description: Delete trash dump pin handler.
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /trash-dumps
            Method: DELETE
      Environment:
        Variables:
          DUMP_PINS_TABLE: !Ref DumpPins
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DumpPins
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - delete-trash-dump-pin.ts

  UpdateTrashDumpPinStatus:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update-trash-dump-pin-status.updateTrashDumpPinStatusHandler
      CodeUri: src/handlers/trash-dump-pins
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 100
      Description: Update trash dump pin status - OPEN, CLOSED, .
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /trash-dumps
            Method: PATCH
      Environment:
        Variables:
          DUMP_PINS_TABLE: !Ref DumpPins
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DumpPins
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - update-trash-dump-pin-status.ts

  CreateUser:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create-user.createUserHandler
      CodeUri: src/handlers/user
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Create a new user in the Users table.
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /users
            Method: POST
      Environment:
        Variables:
          USERS_TABLE: !Ref Users
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref Users

    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - create-user.ts

  PostAuthConfirmation:
    Type: AWS::Serverless::Function
    Properties:
      Handler: postAuthConfirmation.postAuthConfirmation
      CodeUri: src/handlers/auth
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Cognito post-confirmation trigger that creates a user record.
      Environment:
        Variables:
          USERS_TABLE: !Ref Users
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt Users.Arn
      Events:
        CognitoPostConfirmation:
          Type: Cognito
          Properties:
            UserPool: !Ref CognitoUserPool
            Trigger: PostConfirmation
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - postAuthConfirmation.ts

  CreateEvent:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create-event.createEventHandler
      CodeUri: src/handlers/events
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Create a new event in the Events table.
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /events
            Method: POST
      Environment:
        Variables:
          EVENTS_TABLE: !Ref Events
          DUMP_PINS_TABLE: !Ref DumpPins
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref Events
        - DynamoDBReadPolicy:
            TableName: !Ref DumpPins
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - create-event.ts

  GetEventsByGeohash:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-events-by-geohash.getEventsByGeohash
      CodeUri: src/handlers/events
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Get events by geohash and its neighbors.
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /events
            Method: GET
            Auth:
              Authorizer: NONE
      Environment:
        Variables:
          EVENTS_TABLE: !Ref Events
          EVENT_PARTICIPANTS_TABLE: !Ref EventParticipants
          USERS_TABLE: !Ref Users
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref Events
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - get-events-by-geohash.ts

  GetEventById:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-event-by-id.getEventById
      CodeUri: src/handlers/events
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Get event by ID.
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /events/{eventId}
            Method: GET
            Auth:
              Authorizer: NONE
      Environment:
        Variables:
          EVENTS_TABLE: !Ref Events
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref Events
        - DynamoDBReadPolicy:
            TableName: !Ref EventParticipants
        - DynamoDBReadPolicy:
            TableName: !Ref Users
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - get-event-by-id.ts

  SignUpToEvent:
    Type: AWS::Serverless::Function
    Properties:
      Handler: sign-up-to-event.signUpToEvent
      CodeUri: src/handlers/events
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: User sign up to event handler.
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /events/signup
            Method: POST
      Environment:
        Variables:
          EVENT_PARTICIPANTS_TABLE: !Ref EventParticipants
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventParticipants
        - DynamoDBReadPolicy:
            TableName: !Ref Events
        - DynamoDBReadPolicy:
            TableName: !Ref Users
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - sign-up-to-event.ts

  GetUserEvents:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-user-events.getUserEvents
      CodeUri: src/handlers/events
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Get all events for a user from EventParticipants table.
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /events/user/{userId}
            Method: GET
      Environment:
        Variables:
          EVENT_PARTICIPANTS_TABLE: !Ref EventParticipants
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventParticipants
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - get-user-events.ts

  GetUserPointsHistory:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-user-points-history.getUserPointsHistory
      CodeUri: src/handlers/user
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Get all points history for a user from PointTransactions table.
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /users/{userId}/points-history
            Method: GET
      Environment:
        Variables:
          POINT_TRANSACTIONS_TABLE: !Ref PointTransactions
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PointTransactions
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - get-user-points-history.ts

  UpdateUserEvent:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update-user-event.updateUserEvent
      Runtime: nodejs22.x
      CodeUri: src/handlers/events
      Description: Updates a user's event registration
      MemorySize: 128
      Timeout: 10
      Events:
        UpdateUserEventApi:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /events/{eventId}/users/{userId}
            Method: PUT
      Environment:
        Variables:
          EVENT_PARTICIPANTS_TABLE: !Ref EventParticipants
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventParticipants
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - update-user-event.ts

  UpdateEvent:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update-event.updateEvent
      Runtime: nodejs22.x
      CodeUri: src/handlers/events
      Description: Updates an event's details
      MemorySize: 128
      Timeout: 10
      Events:
        UpdateEventApi:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /events/{eventId}
            Method: PUT
      Environment:
        Variables:
          EVENTS_TABLE: !Ref Events
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref Events
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - update-event.ts

  CompleteEvent:
    Type: AWS::Serverless::Function
    Properties:
      Handler: complete-event.completeEvent
      Runtime: nodejs22.x
      CodeUri: src/handlers/events
      Description: Complete an event - assign points to users, update event status, etc.
      MemorySize: 128
      Timeout: 10
      Events:
        completeEventApi:
          Type: Api
          Properties:
            RestApiId: !Ref CleanUpSikkimApi
            Path: /events/{eventId}/complete
            Method: POST
      Environment:
        Variables:
          EVENTS_TABLE: !Ref Events
          EVENT_PARTICIPANTS_TABLE: !Ref EventParticipants
          USERS_TABLE: !Ref Users
          POINT_TRANSACTIONS_TABLE: !Ref PointTransactions
          DUMP_PINS_TABLE: !Ref DumpPins
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:TransactWriteItems
              Resource:
                - !GetAtt Events.Arn
                - !GetAtt EventParticipants.Arn
                - !GetAtt Users.Arn
                - !GetAtt PointTransactions.Arn
                - !GetAtt DumpPins.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - complete-event.ts

Outputs:
  CognitoUserPoolId:
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-CognitoUserPoolId"

  CognitoUserPoolArn:
    Value: !GetAtt CognitoUserPool.Arn
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-CognitoUserPoolArn"

  CognitoUserPoolClientId:
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-CognitoUserPoolClientId"

  UsersTableName:
    Value: !Ref Users
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-UsersTable"

  UsersTableArn:
    Value: !GetAtt Users.Arn
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-UsersTableArn"

  PostAuthConfirmationFunctionArn:
    Value: !GetAtt PostAuthConfirmation.Arn
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-PostAuthConfirmationFunctionArn"

  DumpPinsTableName:
    Value: !Ref DumpPins
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-DumpPinsTable"

  DumpPinsTableArn:
    Value: !GetAtt DumpPins.Arn
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-DumpPinsTableArn"

  EventsTableName:
    Value: !Ref Events
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-EventsTable"

  EventsTableArn:
    Value: !GetAtt Events.Arn
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-EventsTableArn"

  EventParticipantsTableName:
    Value: !Ref EventParticipants
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-EventParticipantsTable"

  EventParticipantsTableArn:
    Value: !GetAtt EventParticipants.Arn
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-EventParticipantsTableArn"

  PointTransactionsTableName:
    Value: !Ref PointTransactions
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-PointTransactionsTable"

  PointTransactionsTableArn:
    Value: !GetAtt PointTransactions.Arn
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-PointTransactionsTableArn"
