# The AWSTemplateFormatVersion identifies the capabilities of the template
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/format-version-structure.html
AWSTemplateFormatVersion: 2010-09-09
Description: >-
  clean-up-sikkim
Transform:
  - AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        DYNAMODB_ENDPOINT: http://host.docker.internal:8000

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: "The deployment environment."

Resources:
  CleanUpSikkimUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${Environment}-CleanUpSikkim-UserPool"
      UsernameAttributes:
        - email # login with email
      AutoVerifiedAttributes:
        - email # Cognito sends verification email automatically
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: false
        - Name: name
          Required: true
          Mutable: true
        - Name: phone_number
          Required: false # collect it but don't require it at signup
          Mutable: true
        - Name: custom:city
          Required: false
          Mutable: true
        - Name: custom:state
          Required: false
          Mutable: true
      LambdaConfig:
        PostConfirmation: !GetAtt PostConfirmationFunction.Arn

  CleanUpSikkimUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${Environment}-CleanUpSikkim-UserPoolClient"
      UserPoolId: !Ref CleanUpSikkimUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH # secure password auth
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30

  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-PostConfirmation"
      Handler: src/functions/auth/postConfirmation.handler
      Runtime: nodejs20.x
      Environment:
        Variables:
          USERS_TABLE: !Ref Users
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref Users

  PostConfirmationFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PostConfirmationFunction.Arn
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CleanUpSikkimUserPool.Arn

  # DynamoDB tables
  Users:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Users
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: city
          AttributeType: S
        - AttributeName: state
          AttributeType: S
        - AttributeName: totalPoints
          AttributeType: N
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: GSI-City-Points
          KeySchema:
            - AttributeName: city
              KeyType: HASH
            - AttributeName: totalPoints
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
        - IndexName: GSI-State-Points
          KeySchema:
            - AttributeName: state
              KeyType: HASH
            - AttributeName: totalPoints
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  DumpPins:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: DumpPins
      AttributeDefinitions:
        - AttributeName: pinId
          AttributeType: S
        - AttributeName: geohash
          AttributeType: S
        - AttributeName: city
          AttributeType: S
        - AttributeName: state
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: reportedBy
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: pinId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: GSI-Geohash
          KeySchema:
            - AttributeName: geohash
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-City-Status
          KeySchema:
            - AttributeName: city
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-State-Status
          KeySchema:
            - AttributeName: state
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-ReportedBy
          KeySchema:
            - AttributeName: reportedBy
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  Events:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Events
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: geohash
          AttributeType: S
        - AttributeName: scheduledAt
          AttributeType: S
        - AttributeName: geohash4
          AttributeType: S
        - AttributeName: geohash5
          AttributeType: S
        - AttributeName: pinId
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: GSI-Geohash-Time
          KeySchema:
            - AttributeName: geohash
              KeyType: HASH
            - AttributeName: scheduledAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-Geohash4-Time
          KeySchema:
            - AttributeName: geohash4
              KeyType: HASH
            - AttributeName: scheduledAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-Geohash5-Time
          KeySchema:
            - AttributeName: geohash5
              KeyType: HASH
            - AttributeName: scheduledAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI-Pin-Events
          KeySchema:
            - AttributeName: pinId
              KeyType: HASH
            - AttributeName: scheduledAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  EventParticipants:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: EventParticipants
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: registeredAt
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI-User-Events
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: registeredAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  PointTransactions:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PointTransactions
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: txnId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: txnId
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  # Lambda function definitions
  GetTrashDumps:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-trash-dumps.getTrashDumpsHandler
      CodeUri: src/handlers/trash-dump-pins
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 100
      Description: Get all trash dump pins for a given lat and lng.
      Events:
        Api:
          Type: Api
          Properties:
            Path: /trash-dumps
            Method: GET
      Environment:
        Variables:
          DUMP_PINS_TABLE: !Ref DumpPins
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - get-trash-dumps.ts

  CreateTrashDumpPin:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create-trash-dump-pin.createTrashDumpPinHandler
      CodeUri: src/handlers/trash-dump-pins
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 100
      Description: Create a new trash dump pin with given details.
      Events:
        Api:
          Type: Api
          Properties:
            Path: /trash-dumps
            Method: POST
      Environment:
        Variables:
          DUMP_PINS_TABLE: !Ref DumpPins
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - create-trash-dump-pin.ts

  DeleteTrashDumpPin:
    Type: AWS::Serverless::Function
    Properties:
      Handler: delete-trash-dump-pin.deleteTrashDumpPinHandler
      CodeUri: src/handlers/trash-dump-pins
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 100
      Description: Delete trash dump pin handler.
      Events:
        Api:
          Type: Api
          Properties:
            Path: /trash-dumps
            Method: DELETE
      Environment:
        Variables:
          DUMP_PINS_TABLE: !Ref DumpPins
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - delete-trash-dump-pin.ts

  UpdateTrashDumpPinStatus:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update-trash-dump-pin-status.updateTrashDumpPinStatusHandler
      CodeUri: src/handlers/trash-dump-pins
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 100
      Description: Update trash dump pin status - OPEN, CLOSED, .
      Events:
        Api:
          Type: Api
          Properties:
            Path: /trash-dumps
            Method: PATCH
      Environment:
        Variables:
          DUMP_PINS_TABLE: !Ref DumpPins
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - update-trash-dump-pin-status.ts

  CreateUser:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create-user.createUserHandler
      CodeUri: src/handlers/user
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Create a new user in the Users table.
      Events:
        Api:
          Type: Api
          Properties:
            Path: /users
            Method: POST
      Environment:
        Variables:
          USERS_TABLE: !Ref Users

    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - create-user.ts

  CreateEvent:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create-event.createEventHandler
      CodeUri: src/handlers/events
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Create a new event in the Events table.
      Events:
        Api:
          Type: Api
          Properties:
            Path: /events
            Method: POST
      Environment:
        Variables:
          EVENTS_TABLE: !Ref Events
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - create-event.ts

  GetEventsByGeohash:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-events-by-geohash.getEventsByGeohash
      CodeUri: src/handlers/events
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Get events by geohash and its neighbors.
      Events:
        Api:
          Type: Api
          Properties:
            Path: /events
            Method: GET
      Environment:
        Variables:
          EVENTS_TABLE: !Ref Events
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - get-events-by-geohash.ts

  GetEventById:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-event-by-id.getEventById
      CodeUri: src/handlers/events
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Get event by ID.
      Events:
        Api:
          Type: Api
          Properties:
            Path: /events/{eventId}
            Method: GET
      Environment:
        Variables:
          EVENTS_TABLE: !Ref Events
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - get-event-by-id.ts

  SignUpToEvent:
    Type: AWS::Serverless::Function
    Properties:
      Handler: sign-up-to-event.signUpToEvent
      CodeUri: src/handlers/events
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: User sign up to event handler.
      Events:
        Api:
          Type: Api
          Properties:
            Path: /events/signup
            Method: POST
      Environment:
        Variables:
          EVENTS_PARTICIPANTS_TABLE: !Ref EventParticipants
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - sign-up-to-event.ts

  GetUserEvents:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-user-events.getUserEvents
      CodeUri: src/handlers/events
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Get all events for a user from EventParticipants table.
      Events:
        Api:
          Type: Api
          Properties:
            Path: /events/user/{userId}
            Method: GET
      Environment:
        Variables:
          EVENTS_PARTICIPANTS_TABLE: !Ref EventParticipants
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - get-user-events.ts

  GetUserPointsHistory:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-user-points-history.getUserPointsHistory
      CodeUri: src/handlers/user
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10
      Description: Get all points history for a user from PointTransactions table.
      Events:
        Api:
          Type: Api
          Properties:
            Path: /users/{userId}/points-history
            Method: GET
      Environment:
        Variables:
          POINT_TRANSACTIONS_TABLE: !Ref PointTransactions
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - get-user-points-history.ts

  UpdateUserEvent:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update-user-event.updateUserEvent
      Runtime: nodejs22.x
      CodeUri: src/handlers/events
      Description: Updates a user's event registration
      MemorySize: 128
      Timeout: 10
      Events:
        UpdateUserEventApi:
          Type: Api
          Properties:
            Path: /events/{eventId}/users/{userId}
            Method: PUT
      Environment:
        Variables:
          EVENTS_PARTICIPANTS_TABLE: !Ref EventParticipants
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - update-user-event.ts

  UpdateEvent:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update-event.updateEvent
      Runtime: nodejs22.x
      CodeUri: src/handlers/events
      Description: Updates an event's details
      MemorySize: 128
      Timeout: 10
      Events:
        UpdateEventApi:
          Type: Api
          Properties:
            Path: /events/{eventId}
            Method: PUT
      Environment:
        Variables:
          EVENTS_TABLE: !Ref Events
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - update-event.ts

  CompleteEvent:
    Type: AWS::Serverless::Function
    Properties:
      Handler: complete-event.completeEvent
      Runtime: nodejs22.x
      CodeUri: src/handlers/events
      Description: Complete an event - assign points to users, update event status, etc.
      MemorySize: 128
      Timeout: 10
      Events:
        completeEventApi:
          Type: Api
          Properties:
            Path: /events/{eventId}/complete
            Method: POST
      Environment:
        Variables:
          EVENTS_TABLE: !Ref Events
          EVENTS_PARTICIPANTS_TABLE: !Ref EventParticipants
          USERS_TABLE: !Ref Users
          POINT_TRANSACTIONS_TABLE: !Ref PointTransactions
          DUMP_PINS_TABLE: !Ref DumpPins
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - complete-event.ts

Outputs:
  UsersTableName:
    Value: !Ref Users
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-UsersTable"

  UsersTableArn:
    Value: !GetAtt Users.Arn
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-UsersTableArn"

  DumpPinsTableName:
    Value: !Ref DumpPins
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-DumpPinsTable"

  DumpPinsTableArn:
    Value: !GetAtt DumpPins.Arn
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-DumpPinsTableArn"

  EventsTableName:
    Value: !Ref Events
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-EventsTable"

  EventsTableArn:
    Value: !GetAtt Events.Arn
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-EventsTableArn"

  EventParticipantsTableName:
    Value: !Ref EventParticipants
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-EventParticipantsTable"

  EventParticipantsTableArn:
    Value: !GetAtt EventParticipants.Arn
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-EventParticipantsTableArn"

  PointTransactionsTableName:
    Value: !Ref PointTransactions
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-PointTransactionsTable"

  PointTransactionsTableArn:
    Value: !GetAtt PointTransactions.Arn
    Export:
      Name: !Sub "${Environment}-CleanUpSikkim-PointTransactionsTableArn"
